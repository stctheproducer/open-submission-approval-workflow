# Local PostgreSQL and Mailpit for development and tests.
services:
  pgsql:
    image: 'postgres:18'
    ports:
      - '${DB_PORT:-5432}:5432'
    environment:
      PGPASSWORD: '${DB_PASSWORD:-secret}'
      POSTGRES_DB: '${DB_DATABASE:-default}'
      POSTGRES_USER: '${DB_USER}'
      POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
    volumes:
      - 'pgsql-data:/var/lib/postgresql'
    networks:
      - local
    healthcheck:
      test: ['CMD', 'pg_isready', '-q', '-d', '${DB_DATABASE:-default}', '-U', '${DB_USER}']
      retries: 3
      timeout: 5s

  pgsql-test:
    image: 'postgres:18'
    ports:
      - '5433:5432'
    environment:
      PGPASSWORD: '${DB_PASSWORD:-secret}'
      POSTGRES_DB: 'app_test'
      POSTGRES_USER: '${DB_USER}'
      POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
    volumes:
      - 'pgsql-test-data:/var/lib/postgresql'
    networks:
      - local
    healthcheck:
      test: ['CMD', 'pg_isready', '-q', '-d', 'app_test', '-U', '${DB_USER}']
      retries: 3
      timeout: 5s

  mailpit:
    image: 'axllent/mailpit:latest'
    ports:
      - '${FORWARD_MAILPIT_PORT:-1025}:1025'
      - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
    networks:
      - local
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8025/livez']
      interval: 30s
      timeout: 10s
      retries: 5

networks:
  local:
    driver: bridge

volumes:
  pgsql-data:
  pgsql-test-data:
