tasks:
  - name: session-login-seed
    description: Let an applicant and reviewer sign in through the shared session access path.
    track: brief
  - name: role-based-landing-guards
    description: Let signed-in users land in the area that matches their role.
    track: brief
  - name: workflow-authorization-hardening
    description: Enforce applicant ownership and reviewer assignment across workflow actions.
    track: brief
  - name: error-contract-proofing
    description: Prove shared error responses for workflow and access failures.
    track: brief
  - name: application-draft-ownership
    description: Let an applicant create, view, and edit their own draft application.
    track: brief
  - name: application-submission-history
    description: Let an applicant submit a draft application and see that submission in history.
    track: brief
  - name: reviewer-queue-start
    description: Let a reviewer see queued work and start owned review.
    track: brief
  - name: reviewer-application-detail
    description: Let a reviewer inspect an application and its audit history before deciding.
    track: brief
  - name: reviewer-queue-status-filtering
    description: Let a reviewer narrow the queue by application status.
    track: brief
  - name: application-approval
    description: Let an assigned reviewer approve an application under review.
    track: brief
  - name: application-rejection-comment
    description: Let an assigned reviewer reject with a required comment.
    track: brief
  - name: application-change-request
    description: Let a reviewer return an application for changes with a comment.
    track: brief
  - name: application-draft-reopening
    description: Let an applicant reopen a returned application back to draft.
    track: brief
  - name: workflow-conflicts
    description: Make illegal workflow transitions return consistent conflict behavior.
    track: brief
  - name: api-error-responses
    description: Make every thrown API exception return a single RFC 9457 problem-details response.
    track: brief
  - name: application-read-history
    description: Let an applicant review any owned application and its status-transition history.
    track: brief
  - name: application-option-sets
    description: Provide backend-owned category options for applicant draft flows.
    track: brief
  - name: draft-application-attachment
    description: Let an applicant attach and replace one supported file on a draft application.
    track: brief
  - name: application-resubmission-history
    description: Record distinct revision-round submission history on reopened applications.
    track: brief
